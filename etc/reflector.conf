# /etc/xdg/reflector/reflector.conf
# Configuración de reflector para actualizar el mirrorlist automáticamente.
# Se aplica con: sudo reflector --config /etc/xdg/reflector/reflector.conf
# O vía el timer: systemctl enable --now reflector.timer

# Países de referencia (España + vecinos para latencia baja)
--country Spain,France,Germany,Portugal

# Solo mirrors con HTTPS
--protocol https

# Los más rápidos según velocidad de descarga
--sort rate

# Guardar los 10 mejores
--save /etc/pacman.d/mirrorlist

# Máximo de mirrors a testear
--number 10

# Excluir mirrors sin sincronización reciente (últimas 12 horas)
--latest 10
--age 12
