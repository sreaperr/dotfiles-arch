# Reflector - selección automática de mirrors de pacman
# Documentación: https://xyne.dev/projects/reflector/

# País (España + cercanos para mejor velocidad)
--country Spain,France,Germany,Netherlands

# Solo mirrors HTTPS
--protocol https

# Los 10 más rápidos
--latest 10
--sort rate

# Guardar en mirrorlist
--save /etc/pacman.d/mirrorlist
