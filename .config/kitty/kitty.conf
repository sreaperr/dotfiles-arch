#==========================
# KITTY DE DOTFILES ARCH
#==========================

#-----------
# FUENTE
#-----------
font_family      GeistMono Nerd Font
bold_font        GeistMono Nerd Font Bold
italic_font      GeistMono Nerd Font Italic
bold_italic_font GeistMono Nerd Font Bold Italic
font_size        12.5

# Powerline y Nerd Font symbols (PUA range) — GeistMono NF ya los incluye
symbol_map U+E0B0-U+E0D4 GeistMono Nerd Font
symbol_map U+E000-U+E00A,U+EA60-U+EBEB,U+E200-U+E2A9,U+E300-U+E3E3,U+E5FA-U+E6B1,U+E700-U+E7C5,U+F000-U+F2E0,U+F300-U+F372,U+F400-U+F532,U+F0001-U+F1AF0 GeistMono Nerd Font

# Ajuste fino de renderizado
adjust_line_height  110%
adjust_column_width 100%

#-----------
# CURSOR
#-----------
cursor_shape           beam
cursor_blink_interval  0.5
cursor_stop_blinking_after 0

#-----------
# TRANSPARENCIA Y BLUR
background_opacity 0.88
confirm_os_window_close 0
# Permite aplicar colores en vivo con: kitty @ set-colors
allow_remote_control yes
listen_on unix:/tmp/kitty-$USER

#-----------
# VENTANA
#-----------
window_padding_width    10
window_padding_height   10
hide_window_decorations yes
remember_window_size    yes

#-----------
# PESTAÑAS
#-----------
tab_bar_edge            bottom
tab_bar_style           powerline
tab_powerline_style     slanted
tab_title_template      "{index}: {title}"
active_tab_font_style   bold
inactive_tab_font_style normal

#-----------
# SCROLL
#-----------
scrollback_lines        10000
wheel_scroll_multiplier 5.0

#-----------
# RENDIMIENTO
#-----------
repaint_delay    10
input_delay      3
sync_to_monitor  yes

#-----------
# ATAJOS DE TECLADO
#-----------
# Pestañas
map ctrl+t     new_tab
map ctrl+w     close_tab
map ctrl+right next_tab
map ctrl+left  prev_tab

# Ventanas divididas
map ctrl+shift+enter new_window
map ctrl+shift+w     close_window
map ctrl+shift+right next_window
map ctrl+shift+left  prev_window

# Tamaño de fuente
map ctrl+equal  change_font_size all +1.0
map ctrl+minus  change_font_size all -1.0
map ctrl+0      change_font_size all 0

# Copiar y pegar
map ctrl+shift+c copy_to_clipboard
map ctrl+shift+v paste_from_clipboard

#-----------
# TEMA DE COLORES
#-----------
# Generado por theme-switch.sh — no editar manualmente
include theme.conf

#-----------
# BELL
#-----------
enable_audio_bell no
visual_bell_duration 0.0
