#==========================
# KEYD - TECLADO MAC EN LINUX
#==========================

[ids]
# Aplica a todos los teclados
# Para limitar a un teclado concreto, pon aquí el ID del dispositivo
# (obtenerlo con: sudo keyd monitor)
*

[main]
# Caps Lock → Escape
capslock = esc

# F3 (Mission Control en Mac) → alineador de ventanas Hyprland
scale = f3
# F4 (Launchpad en Mac) → lanzador de apps
launchb = f4

[meta]
# Cmd+C/V/X/Z/A/S → Ctrl equivalente (estilo macOS)
c = C-c
v = C-v
x = C-x
z = C-z
a = C-a
s = C-s
# Cmd+W → Ctrl+W (cerrar pestaña en navegador/kitty)
w = C-w
# Cmd+T → Ctrl+T (nueva pestaña en navegador/kitty)
t = C-t
# Cmd+F → Ctrl+F (buscar)
f = C-f
# Cmd+Z → Ctrl+Z (deshacer)
# Cmd+Shift+Z → Ctrl+Shift+Z (rehacer)
