#==========================
# KEYD - TECLADO MAC EN LINUX
#==========================

[ids]
# Aplica a todos los teclados
# Para limitar a un teclado concreto, pon aquí el ID del dispositivo
# (obtenerlo con: sudo keyd monitor)
*

[main]
# Teclas para regular el volumen
 f10 = mute
 f11 = volumedown
 f12 = volumeup
# F3 (Mission Control en Mac) → alineador de ventanas Hyprland
scale = f3
# fn/opt derecho → AltGr (el firmware del K3 gestiona Fn+Fila, no el SO)
fn = rightalt

[meta]
# Cmd+C/V/X/Z/A → Ctrl equivalente (estilo macOS)
c = C-c
v = C-v
x = C-x
z = C-z
a = C-a
# Cmd+F → Ctrl+F (buscar)
f = C-f

# Pasar como SUPER para que Hyprland reciba los atajos globales
# (keyd consume el modificador meta para todas las letras del layer)
b = M-b
e = M-e
h = M-h
i = M-i
l = M-l
m = M-m
n = M-n
p = M-p
q = M-q
r = M-r
s = M-s
t = M-t
w = M-w
[meta+shift]
#Captura de pantalla
4 = print
