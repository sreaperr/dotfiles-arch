#==========================
# STARSHIP DE DOTFILES ARCH
#==========================
format = """
┌──($username$hostname) [$directory]($git_branch$git_status)([ $cmd_duration])([ $time])
├─($python$nodejs$rust$golang$java$lua$c$kotlin$php$ruby$swift$perl$scala$elixir$haskell$zig$package$terraform$ansible$cmake$conda$helm$kubernetes$docker_context$sudo$memory_usage)
└─$character """

#---------------
# USUARIO Y HOST
#---------------
[username]
show_always = true
format = "[$user]($style)"
style_user = "bold yellow"
style_root = "bold red"

[hostname]
ssh_only = false
format = "[@$hostname]($style)"
style = "bold blue"

#-----------
# DIRECTORIO
#-----------
[directory]
format = "[$path]($style)[$read_only]($read_only_style)"
style = "bold cyan"
truncation_length = 3
truncate_to_repo = false
read_only = " 󰌾"
read_only_style = "bold red"

#----
# GIT
#----
[git_branch]
format = "[ $symbol$branch(:$remote_branch)]($style)"
symbol = " "
style = "bold purple"

[git_status]
format = '([$all_status$ahead_behind]($style))'
style = "bold yellow"
ahead = "⇡${count}"
behind = "⇣${count}"
diverged = "⇕⇡${ahead_count}⇣${behind_count}"
modified = "!${count}"
staged = "+${count}"
untracked = "?${count}"
deleted = "✘${count}"
stashed = "󰏗 ${count}"

#----------
# LENGUAJES
#----------
[python]
format = "[ $symbol($version)]($style)"
symbol = " "

[nodejs]
format = "[ $symbol($version)]($style)"
symbol = " "

[rust]
format = "[ $symbol($version)]($style)"
symbol = " "

[golang]
format = "[ $symbol($version)]($style)"
symbol = " "

[java]
format = "[ $symbol($version)]($style)"
symbol = " "

[kotlin]
format = "[ $symbol($version)]($style)"
symbol = " "

[php]
format = "[ $symbol($version)]($style)"
symbol = " "

[ruby]
format = "[ $symbol($version)]($style)"
symbol = " "

[swift]
format = "[ $symbol($version)]($style)"
symbol = " "

[lua]
format = "[ $symbol($version)]($style)"
symbol = " "

[perl]
format = "[ $symbol($version)]($style)"
symbol = " "

[scala]
format = "[ $symbol($version)]($style)"
symbol = " "

[elixir]
format = "[ $symbol($version)]($style)"
symbol = " "

[haskell]
format = "[ $symbol($version)]($style)"
symbol = " "

[zig]
format = "[ $symbol($version)]($style)"
symbol = " "

[c]
format = "[ $symbol($version)]($style)"
symbol = " "

[docker_context]
format = "[ $symbol$context]($style)"
symbol = " "

[package]
format = "[ $symbol$version]($style)"
symbol = "󰏗 "

[terraform]
format = "[ $symbol$workspace]($style)"
symbol = "󱁢 "

[ansible]
format = "[ $symbol$version]($style)"
symbol = "󱂚 "

[cmake]
format = "[ $symbol($version)]($style)"
symbol = " "

[conda]
format = "[ $symbol$environment]($style)"
symbol = " "

[helm]
format = "[ $symbol($version)]($style)"
symbol = "⎈ "

[kubernetes]
format = "[ $symbol$context( \\($namespace\\))]($style)"
symbol = "󱃾 "
disabled = false

[sudo]
format = "[ $symbol]($style)"
symbol = "󰯄 "
disabled = false

[memory_usage]
format = "[ $symbol$ram]($style)"
symbol = "󰍛 "
threshold = 75
disabled = false

#--------------------
# TIEMPO DE EJECUCIÓN
#--------------------
[cmd_duration]
min_time = 2_000
format = "[ $duration](bold yellow)"

#-----
# HORA
#-----
[time]
disabled = false
format = "[ $time](dimmed white)"
time_format = "%H:%M"

#-------
# PROMPT
#-------
[character]
success_symbol = "[❯](bold green)"
error_symbol = "[❯](bold red)"
