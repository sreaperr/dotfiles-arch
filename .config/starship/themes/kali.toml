#==========================
# STARSHIP DE DOTFILES KALI
#==========================
format = """
в”Ңв”Җв”Җ($username$hostname) [$directory]($git_branch$git_status)($cmd_duration)($time)
в”ңв”Җ($python$nodejs$rust$golang$java$lua$c$kotlin$php$ruby$swift$perl$scala$elixir$haskell$zig$package$terraform$cmake$conda$helm$kubernetes$docker_context$sudo$memory_usage)
в””в”Җ$character """

#---------------
# USUARIO Y HOST
#---------------
[username]
show_always = true
format = "[$user]($style)"
style_user = "bold #ff2d78"
style_root = "bold #ff1744"

[hostname]
ssh_only = false
format = "[пҢ§ $hostname]($style)"
style = "bold #00d4ff"

#-----------
# DIRECTORIO
#-----------
[directory]
format = "[$path]($style)[$read_only]($read_only_style)"
style = "bold #00ff41"
truncation_length = 3
truncate_to_repo = false
read_only = " у°Ңҫ"
read_only_style = "bold #ff1744"

#----
# GIT
#----
[git_branch]
format = "[ $symbol$branch(:$remote_branch)]($style)"
symbol = " "
style = "bold #ff2d78"

[git_status]
format = '([$all_status$ahead_behind]($style))'
style = "bold #ffd700"
ahead = "вҮЎ${count}"
behind = "вҮЈ${count}"
diverged = "вҮ•вҮЎ${ahead_count}вҮЈ${behind_count}"
modified = "!${count}"
staged = "+${count}"
untracked = "?${count}"
deleted = "вңҳ${count}"
stashed = "у°Ҹ— ${count}"

#----------
# LENGUAJES
#----------
[python]
format = "[ $symbol($version)]($style)"
symbol = " "

[nodejs]
format = "[ $symbol($version)]($style)"
symbol = " "

[rust]
format = "[ $symbol($version)]($style)"
symbol = " "

[golang]
format = "[ $symbol($version)]($style)"
symbol = " "

[java]
format = "[ $symbol($version)]($style)"
symbol = " "

[kotlin]
format = "[ $symbol($version)]($style)"
symbol = " "

[php]
format = "[ $symbol($version)]($style)"
symbol = " "

[ruby]
format = "[ $symbol($version)]($style)"
symbol = " "

[swift]
format = "[ $symbol($version)]($style)"
symbol = " "

[lua]
format = "[ $symbol($version)]($style)"
symbol = " "

[perl]
format = "[ $symbol($version)]($style)"
symbol = " "

[scala]
format = "[ $symbol($version)]($style)"
symbol = " "

[elixir]
format = "[ $symbol($version)]($style)"
symbol = " "

[haskell]
format = "[ $symbol($version)]($style)"
symbol = " "

[zig]
format = "[ $symbol($version)]($style)"
symbol = " "

[c]
format = "[ $symbol($version)]($style)"
symbol = " "

[docker_context]
format = "[ $symbol$context]($style)"
symbol = " "

[package]
format = "[ $symbol$version]($style)"
symbol = "у°Ҹ— "

[terraform]
format = "[ $symbol$workspace]($style)"
symbol = "уұҒў "

[cmake]
format = "[ $symbol($version)]($style)"
symbol = " "

[conda]
format = "[ $symbol$environment]($style)"
symbol = " "

[helm]
format = "[ $symbol($version)]($style)"
symbol = "вҺҲ "

[kubernetes]
format = "[ $symbol$context( \\($namespace\\))]($style)"
symbol = "уұғҫ "
disabled = false

[sudo]
format = "[ $symbol]($style)"
symbol = "у°Ҝ„ "
disabled = false

[memory_usage]
format = "[ $symbol$ram]($style)"
symbol = "у°Қӣ "
threshold = 75
disabled = false

#--------------------
# TIEMPO DE EJECUCIГ“N
#--------------------
[cmd_duration]
min_time = 2_000
format = "[ $duration](bold #ffd700)"

#-----
# HORA
#-----
[time]
disabled = false
format = "[ $time](dimmed #e2eaf8)"
time_format = "%H:%M"

#-------
# PROMPT
#-------
[character]
success_symbol = "[вқҜ](bold #00ff41)"
error_symbol = "[вқҜ](bold #ff1744)"
