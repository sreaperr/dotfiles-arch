# YAZI THEME - TOKYO NIGHT NEON
[manager]
cwd = { fg = "#00d4ff" }

hovered         = { fg = "#0d0e17", bg = "#5597ff" }
preview_hovered = { reversed = true }

find_keyword  = { fg = "#ffd060", bold = true }
find_position = { fg = "#cc66ff", bold = true }

marker_copied   = { fg = "#9bff68", bg = "#9bff68" }
marker_cut      = { fg = "#ff3d73", bg = "#ff3d73" }
marker_marked   = { fg = "#00d4ff", bg = "#00d4ff" }
marker_selected = { fg = "#ffd060", bg = "#ffd060" }

tab_active   = { fg = "#0d0e17", bg = "#5597ff", bold = true }
tab_inactive = { fg = "#3d4268", bg = "#111219" }

count_copied   = { fg = "#0d0e17", bg = "#9bff68" }
count_cut      = { fg = "#0d0e17", bg = "#ff3d73" }
count_marked   = { fg = "#0d0e17", bg = "#00d4ff" }
count_selected = { fg = "#0d0e17", bg = "#ffd060" }

border_symbol = "│"
border_style  = { fg = "#3d4268" }

[status]
separator_open  = ""
separator_close = ""
separator_style = { fg = "#111219", bg = "#111219" }

mode_normal = { fg = "#0d0e17", bg = "#5597ff", bold = true }
mode_select = { fg = "#0d0e17", bg = "#9bff68", bold = true }
mode_unset  = { fg = "#0d0e17", bg = "#cc66ff", bold = true }

progress_label  = { bold = true }
progress_normal = { fg = "#5597ff", bg = "#0d0e17" }
progress_error  = { fg = "#ff3d73", bg = "#0d0e17" }

perm_type  = { fg = "#9bff68" }
perm_read  = { fg = "#ffd060" }
perm_write = { fg = "#ff3d73" }
perm_exec  = { fg = "#00d4ff" }
perm_sep   = { fg = "#3d4268" }

[input]
border   = { fg = "#5597ff" }
title    = { fg = "#00d4ff" }
value    = {}
selected = { reversed = true }

[pick]
border   = { fg = "#5597ff" }
active   = { fg = "#cc66ff" }
inactive = {}

[confirm]
border  = { fg = "#5597ff" }
title   = { fg = "#00d4ff" }
content = {}
list    = {}
btn_yes = { fg = "#0d0e17", bg = "#5597ff" }
btn_no  = {}

[completion]
border   = { fg = "#5597ff" }
active   = { fg = "#cc66ff" }
inactive = {}

[tasks]
border  = { fg = "#5597ff" }
title   = { fg = "#00d4ff" }
hovered = { underline = true }

[which]
mask            = { bg = "#0d0e17" }
cand            = { fg = "#00d4ff" }
rest            = { fg = "#3d4268" }
desc            = { fg = "#cc66ff" }
separator       = "  "
separator_style = { fg = "#3d4268" }

[help]
on      = { fg = "#5597ff" }
off     = {}
run     = { fg = "#00d4ff" }
desc    = {}
hovered = { reversed = true, bold = true }
border  = { fg = "#5597ff" }

[notify]
title_info  = { fg = "#00d4ff" }
title_warn  = { fg = "#ffd060" }
title_error = { fg = "#ff3d73" }

[filetype]
rules = [
  { mime = "image/*",                   fg = "#00d4ff" },
  { mime = "video/*",                   fg = "#cc66ff" },
  { mime = "audio/*",                   fg = "#ffd060" },
  { mime = "application/pdf",           fg = "#ff3d73" },
  { mime = "application/zip",           fg = "#ffd060" },
  { mime = "application/gzip",          fg = "#ffd060" },
  { mime = "application/x-tar",         fg = "#ffd060" },
  { mime = "application/x-bzip2",       fg = "#ffd060" },
  { mime = "application/7z-compressed", fg = "#ffd060" },
  { mime = "application/x-rar",         fg = "#ffd060" },
  { url = "*/",  fg = "#5597ff" },
  { url = "*",   fg = "#c0caf5" },
]
