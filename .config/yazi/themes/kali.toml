# YAZI THEME - KALI
[manager]
cwd = { fg = "#ff2d78" }

hovered         = { fg = "#000000", bg = "#ff2d78" }
preview_hovered = { reversed = true }

find_keyword  = { fg = "#00ff41", bold = true }
find_position = { fg = "#ff2d78", bold = true }

marker_copied   = { fg = "#00ff41", bg = "#00ff41" }
marker_cut      = { fg = "#ff2d78", bg = "#ff2d78" }
marker_marked   = { fg = "#00d4ff", bg = "#00d4ff" }
marker_selected = { fg = "#ffd700", bg = "#ffd700" }

tab_active   = { fg = "#000000", bg = "#ff2d78", bold = true }
tab_inactive = { fg = "#00802a", bg = "#0a0a0a" }

count_copied   = { fg = "#000000", bg = "#00ff41" }
count_cut      = { fg = "#000000", bg = "#ff2d78" }
count_marked   = { fg = "#000000", bg = "#00d4ff" }
count_selected = { fg = "#000000", bg = "#ffd700" }

border_symbol = "│"
border_style  = { fg = "#1a1a1a" }

[status]
separator_open  = ""
separator_close = ""
separator_style = { fg = "#0a0a0a", bg = "#0a0a0a" }

mode_normal = { fg = "#000000", bg = "#ff2d78", bold = true }
mode_select = { fg = "#000000", bg = "#00ff41", bold = true }
mode_unset  = { fg = "#000000", bg = "#00d4ff", bold = true }

progress_label  = { bold = true }
progress_normal = { fg = "#ff2d78", bg = "#000000" }
progress_error  = { fg = "#ff1744", bg = "#000000" }

perm_type  = { fg = "#00ff41" }
perm_read  = { fg = "#ffd700" }
perm_write = { fg = "#ff2d78" }
perm_exec  = { fg = "#00d4ff" }
perm_sep   = { fg = "#1a1a1a" }

[input]
border   = { fg = "#ff2d78" }
title    = { fg = "#ff2d78" }
value    = {}
selected = { reversed = true }

[pick]
border   = { fg = "#ff2d78" }
active   = { fg = "#00ff41" }
inactive = {}

[confirm]
border  = { fg = "#ff2d78" }
title   = { fg = "#ff2d78" }
content = {}
list    = {}
btn_yes = { fg = "#000000", bg = "#ff2d78" }
btn_no  = {}

[completion]
border   = { fg = "#ff2d78" }
active   = { fg = "#00ff41" }
inactive = {}

[tasks]
border  = { fg = "#ff2d78" }
title   = { fg = "#ff2d78" }
hovered = { underline = true }

[which]
mask            = { bg = "#000000" }
cand            = { fg = "#00ff41" }
rest            = { fg = "#1a1a1a" }
desc            = { fg = "#ff2d78" }
separator       = "  "
separator_style = { fg = "#1a1a1a" }

[help]
on      = { fg = "#ff2d78" }
off     = {}
run     = { fg = "#00d4ff" }
desc    = {}
hovered = { reversed = true, bold = true }
border  = { fg = "#ff2d78" }

[notify]
title_info  = { fg = "#00d4ff" }
title_warn  = { fg = "#ffd700" }
title_error = { fg = "#ff1744" }

[filetype]
rules = [
  { mime = "image/*",                  fg = "#00d4ff" },
  { mime = "video/*",                  fg = "#ff2d78" },
  { mime = "audio/*",                  fg = "#ffd700" },
  { mime = "application/pdf",          fg = "#ff1744" },
  { mime = "application/zip",          fg = "#00ff41" },
  { mime = "application/gzip",         fg = "#00ff41" },
  { mime = "application/x-tar",        fg = "#00ff41" },
  { mime = "application/x-bzip2",      fg = "#00ff41" },
  { mime = "application/7z-compressed",fg = "#00ff41" },
  { mime = "application/x-rar",        fg = "#00ff41" },
  { url = "*/",  fg = "#00ff41" },
  { url = "*",   fg = "#e2eaf8" },
]
