# YAZI THEME - GRUVBOX
[manager]
cwd = { fg = "#d79921" }

hovered         = { fg = "#282828", bg = "#fe8019" }
preview_hovered = { reversed = true }

find_keyword  = { fg = "#fabd2f", bold = true }
find_position = { fg = "#fe8019", bold = true }

marker_copied   = { fg = "#b8bb26", bg = "#b8bb26" }
marker_cut      = { fg = "#fb4934", bg = "#fb4934" }
marker_marked   = { fg = "#83a598", bg = "#83a598" }
marker_selected = { fg = "#fabd2f", bg = "#fabd2f" }

tab_active   = { fg = "#282828", bg = "#fe8019", bold = true }
tab_inactive = { fg = "#a89984", bg = "#3c3836" }

count_copied   = { fg = "#282828", bg = "#b8bb26" }
count_cut      = { fg = "#282828", bg = "#fb4934" }
count_marked   = { fg = "#282828", bg = "#83a598" }
count_selected = { fg = "#282828", bg = "#fabd2f" }

border_symbol = "│"
border_style  = { fg = "#504945" }

[status]
separator_open  = ""
separator_close = ""
separator_style = { fg = "#3c3836", bg = "#3c3836" }

mode_normal = { fg = "#282828", bg = "#fe8019", bold = true }
mode_select = { fg = "#282828", bg = "#b8bb26", bold = true }
mode_unset  = { fg = "#282828", bg = "#d3869b", bold = true }

progress_label  = { bold = true }
progress_normal = { fg = "#fe8019", bg = "#282828" }
progress_error  = { fg = "#fb4934", bg = "#282828" }

perm_type  = { fg = "#b8bb26" }
perm_read  = { fg = "#fabd2f" }
perm_write = { fg = "#fb4934" }
perm_exec  = { fg = "#8ec07c" }
perm_sep   = { fg = "#504945" }

[input]
border   = { fg = "#fe8019" }
title    = { fg = "#fabd2f" }
value    = {}
selected = { reversed = true }

[pick]
border   = { fg = "#fe8019" }
active   = { fg = "#fabd2f" }
inactive = {}

[confirm]
border  = { fg = "#fe8019" }
title   = { fg = "#fabd2f" }
content = {}
list    = {}
btn_yes = { fg = "#282828", bg = "#fe8019" }
btn_no  = {}

[completion]
border   = { fg = "#fe8019" }
active   = { fg = "#fabd2f" }
inactive = {}

[tasks]
border  = { fg = "#fe8019" }
title   = { fg = "#fabd2f" }
hovered = { underline = true }

[which]
mask            = { bg = "#1d2021" }
cand            = { fg = "#8ec07c" }
rest            = { fg = "#504945" }
desc            = { fg = "#d3869b" }
separator       = "  "
separator_style = { fg = "#504945" }

[help]
on      = { fg = "#fe8019" }
off     = {}
run     = { fg = "#83a598" }
desc    = {}
hovered = { reversed = true, bold = true }
border  = { fg = "#fe8019" }

[notify]
title_info  = { fg = "#83a598" }
title_warn  = { fg = "#fabd2f" }
title_error = { fg = "#fb4934" }

[filetype]
rules = [
  { mime = "image/*",                  fg = "#83a598" },
  { mime = "video/*",                  fg = "#d3869b" },
  { mime = "audio/*",                  fg = "#fabd2f" },
  { mime = "application/pdf",          fg = "#fb4934" },
  { mime = "application/zip",          fg = "#fe8019" },
  { mime = "application/gzip",         fg = "#fe8019" },
  { mime = "application/x-tar",        fg = "#fe8019" },
  { mime = "application/x-bzip2",      fg = "#fe8019" },
  { mime = "application/7z-compressed",fg = "#fe8019" },
  { mime = "application/x-rar",        fg = "#fe8019" },
  { url = "*/",  fg = "#458588" },
  { url = "*",   fg = "#ebdbb2" },
]
