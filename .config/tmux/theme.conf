# Grayscale

set -g mode-style                  "fg=#c0c0c0,bg=#4d4d4d"
set -g message-style               "fg=#c0c0c0,bg=#4d4d4d"
set -g message-command-style       "fg=#c0c0c0,bg=#4d4d4d"

set -g pane-border-style           "fg=#4d4d4d"
set -g pane-active-border-style    "fg=#c0c0c0"

set -g status                      "on"
set -g status-justify              "left"
set -g status-style                "fg=#c0c0c0,bg=#1a1a1a"
set -g status-left-length          "100"
set -g status-right-length         "100"

set -g status-left  "#[fg=#0d0d0d,bg=#c0c0c0,bold] #S #[fg=#c0c0c0,bg=#1a1a1a,nobold,nounderscore,noitalics]"
set -g status-right "#[fg=#4d4d4d,bg=#1a1a1a,nobold,nounderscore,noitalics]#[fg=#c0c0c0,bg=#4d4d4d] %H:%M #[fg=#c0c0c0,bg=#4d4d4d,nobold,nounderscore,noitalics]#[fg=#0d0d0d,bg=#c0c0c0,bold] #h "

setw -g window-status-activity-style "underscore,fg=#e8e8e8,bg=#1a1a1a"
setw -g window-status-separator      ""
setw -g window-status-style          "NONE,fg=#e8e8e8,bg=#1a1a1a"
setw -g window-status-format         "#[fg=#1a1a1a,bg=#1a1a1a,nobold,nounderscore,noitalics]#[default] #I  #W #F #[fg=#1a1a1a,bg=#1a1a1a,nobold,nounderscore,noitalics]"
setw -g window-status-current-format "#[fg=#1a1a1a,bg=#4d4d4d,nobold,nounderscore,noitalics]#[fg=#c0c0c0,bg=#4d4d4d,bold] #I  #W #F #[fg=#4d4d4d,bg=#1a1a1a,nobold,nounderscore,noitalics]"
