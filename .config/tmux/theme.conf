# One Dark — atom/one-dark

set -g mode-style                  "fg=#61afef,bg=#3e4451"
set -g message-style               "fg=#61afef,bg=#3e4451"
set -g message-command-style       "fg=#61afef,bg=#3e4451"

set -g pane-border-style           "fg=#3e4451"
set -g pane-active-border-style    "fg=#61afef"

set -g status                      "on"
set -g status-justify              "left"
set -g status-style                "fg=#61afef,bg=#1e2127"
set -g status-left-length          "100"
set -g status-right-length         "100"

set -g status-left  "#[fg=#282c34,bg=#61afef,bold] #S #[fg=#61afef,bg=#1e2127,nobold,nounderscore,noitalics]"
set -g status-right "#[fg=#3e4451,bg=#1e2127,nobold,nounderscore,noitalics]#[fg=#61afef,bg=#3e4451] %H:%M #[fg=#61afef,bg=#3e4451,nobold,nounderscore,noitalics]#[fg=#282c34,bg=#61afef,bold] #h "

setw -g window-status-activity-style "underscore,fg=#abb2bf,bg=#1e2127"
setw -g window-status-separator      ""
setw -g window-status-style          "NONE,fg=#abb2bf,bg=#1e2127"
setw -g window-status-format         "#[fg=#1e2127,bg=#1e2127,nobold,nounderscore,noitalics]#[default] #I  #W #F #[fg=#1e2127,bg=#1e2127,nobold,nounderscore,noitalics]"
setw -g window-status-current-format "#[fg=#1e2127,bg=#3e4451,nobold,nounderscore,noitalics]#[fg=#61afef,bg=#3e4451,bold] #I  #W #F #[fg=#3e4451,bg=#1e2127,nobold,nounderscore,noitalics]"
