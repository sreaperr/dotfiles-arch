#==========================
# TMUX - DOTFILES ARCH
#==========================

#-----------
# PREFIJO
#-----------
unbind C-b
set -g prefix C-a
bind C-a send-prefix

#-----------
# GENERAL
#-----------
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB"
set -g mouse on
set -g history-limit 10000
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on
set -g set-clipboard on
set -sg escape-time 0
set -g focus-events on

#-----------
# RECARGA
#-----------
bind r source-file ~/.config/tmux/tmux.conf \; display "Config recargada"

#-----------
# SPLITS
#-----------
# Splits más intuitivos con | y -
unbind '"'
unbind %
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"

# Nueva ventana en el directorio actual
bind c new-window -c "#{pane_current_path}"

#-----------
# NAVEGACIÓN DE PANELES (vim-style)
#-----------
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Redimensionar paneles
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

#-----------
# VENTANAS
#-----------
bind -n S-Right next-window
bind -n S-Left  prev-window

#-----------
# SESIONES
#-----------
bind s choose-session
bind S new-session
bind X confirm-before -p "¿Eliminar sesión? (y/n)" kill-session

#-----------
# MODO COPIA (vim-style)
#-----------
setw -g mode-keys vi
bind Enter copy-mode
bind -T copy-mode-vi v   send -X begin-selection
bind -T copy-mode-vi y   send -X copy-pipe-and-cancel "wl-copy"
bind -T copy-mode-vi C-v send -X rectangle-toggle
bind -T copy-mode-vi H   send -X start-of-line
bind -T copy-mode-vi L   send -X end-of-line

#-----------
# BARRA DE ESTADO
#-----------
set -g status on
set -g status-position bottom
set -g status-interval 2
set -g status-left-length 40
set -g status-right-length 100

# Tema activo — gestionado por theme-switch.sh (symlink a themes/tokyonight.conf o auditory.conf)
source-file ~/.config/tmux/theme.conf

# Contenido de la barra
set -g status-left  " #[bold]#S #[nobold]│ "
set -g status-right " │  #{pane_current_path} │  %H:%M │  %d/%m "

set -g window-status-format         " #I #W "
set -g window-status-current-format " #I #W "

#-----------
# TPM - GESTOR DE PLUGINS
#-----------
set -g @plugin "tmux-plugins/tpm"
set -g @plugin "tmux-plugins/tmux-sensible"

# Guardar y restaurar sesiones al reiniciar
set -g @plugin "tmux-plugins/tmux-resurrect"
set -g @plugin "tmux-plugins/tmux-continuum"
set -g @resurrect-strategy-nvim "session"
set -g @continuum-restore "on"
set -g @continuum-save-interval "10"

# Mejor portapapeles
set -g @plugin "tmux-plugins/tmux-yank"
set -g @yank_selection_mouse "clipboard"

# Inicializar TPM (siempre al final)
run "~/.tmux/plugins/tpm/tpm"
