#============================
# KEYBINDS DE DOTFILES ARCH
#============================
# SUPER = tecla Cmd en teclado Mac (gestionado por keyd)

#--------------
# APLICACIONES
#--------------
bind = SUPER,       return, exec, kitty
bind = SUPER,       y,      exec, ~/.config/hypr/scripts/yazi-float.sh
bind = SUPER,       b,      exec, brave
bind = SUPER,       space,  exec, rofi -show drun -theme ~/.config/rofi/launcher.rasi
bind = SUPER,       equal,  exec, rofi -show calc -no-show-match -no-sort -theme ~/.config/rofi/runner.rasi
bind = SUPER,       tab,    exec, rofi -show window -theme ~/.config/rofi/runner.rasi
bind = SUPER SHIFT, space,  exec, rofi -show run -theme ~/.config/rofi/runner.rasi
bind = SUPER,       s,      exec, rofi -show ssh -theme ~/.config/rofi/runner.rasi

#-----------
# CAPTURAS
#-----------
bind = SUPER SHIFT, s,      exec, hyprshot -m region --clipboard-only && wl-paste | swappy -f -
bind =            , Print,  exec, hyprshot -m output -o ~/Pictures/screenshots/
bind =       SHIFT, Print,  exec, hyprshot -m region -o ~/Pictures/screenshots/

#-----------
# ENTORNO
#-----------
bind = SUPER,       r,      exec, ~/.config/hypr/scripts/recorder.sh
bind = SUPER,       t,      exec, ~/.config/hypr/scripts/theme-switch.sh
bind = SUPER,       n,      exec, ~/.config/hypr/scripts/wallpaper.sh
bind = SUPER,       w,      killactive

#--------
# SISTEMA
#--------
bind = SUPER SHIFT, e,      exit
bind = SUPER,       f,      fullscreen, 0
bind = SUPER SHIFT, f,      togglefloating
bind = SUPER,       p,      pin
bind = SUPER,       l,      exec, hyprlock
bind = SUPER,       i,      exec, ~/.config/hypr/scripts/powermenu.sh

#------------------------
# PANEL Y HERRAMIENTAS
#------------------------
bind = SUPER,       a,     exec, kitty --class fastfetch-term --override initial_window_width=52c --override initial_window_height=38c --hold -e bash -c 'THEME=$(cat ~/.config/.current-theme 2>/dev/null||echo tokyonight);[ "$THEME" = "tokyonight" ]&&C=config-tokyonight||C=config-auditory;fastfetch --config ~/.config/fastfetch/${C}.jsonc'
bind = SUPER,       h,     exec, cliphist list | rofi -dmenu -p "  Portapapeles" -theme ~/.config/rofi/runner.rasi | cliphist decode | wl-copy

#-----------------------
# TECLAS DE FUNCIÓN (Mac)
#-----------------------
# F3 → ciclar orientación de ventanas (master layout)
bind = , f3, exec, hyprctl dispatch layoutmsg orientationcycle
# F4 → overview de workspaces (f4 vía keyd, XF86LaunchB sin keyd)
# PENDIENTE: compilar hyprexpo manualmente (no disponible en hyprpm para Hyprland 0.55.2)
#bind = , f4,          exec, pypr expose
#bind = , XF86LaunchB, exec, pypr expose
# F7/F8/F9 → anterior/play-pause/siguiente
bindl = , XF86AudioPrev,  exec, playerctl previous
bindl = , XF86AudioPlay,  exec, playerctl play-pause
bindl = , XF86AudioNext,  exec, playerctl next
# F10/F11/F12 → mute/volumen -/+
bindl  = , f10, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bindel = , f11, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bindel = , f12, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%+

#------
# AUDIO
#------
bindel = , XF86AudioRaiseVolume,  exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%+
bindel = , XF86AudioLowerVolume,  exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bindl  = , XF86AudioMute,         exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bindl  = , XF86AudioMicMute,      exec, wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle

#-------
# BRILLO
#-------
bindel = , XF86MonBrightnessUp,   exec, brightnessctl set 5%+
bindel = , XF86MonBrightnessDown, exec, brightnessctl set 5%-

#--------------------------------------
# NAVEGACIÓN DE VENTANAS (master layout)
#--------------------------------------
bind = SUPER, left, movefocus, l
bind = SUPER, right, movefocus, r
bind = SUPER, up, movefocus, u
bind = SUPER, down, movefocus, d

# Mover ventanas
bind = SUPER SHIFT, left, movewindow, l
bind = SUPER SHIFT, right, movewindow, r
bind = SUPER SHIFT, up, movewindow, u
bind = SUPER SHIFT, down, movewindow, d

# Redimensionar ventanas
binde = SUPER CTRL, left, resizeactive, -30 0
binde = SUPER CTRL, right, resizeactive,  30 0
binde = SUPER CTRL, up, resizeactive,  0 -30
binde = SUPER CTRL, down, resizeactive,  0  30

# Cambiar ventana maestra
bind = SUPER, m, layoutmsg, swapwithmaster

#-----------
# WORKSPACES
#-----------
bind = SUPER, 1, workspace, 1
bind = SUPER, 2, workspace, 2
bind = SUPER, 3, workspace, 3
bind = SUPER, 4, workspace, 4
bind = SUPER, 5, workspace, 5
bind = SUPER, 6, workspace, 6
bind = SUPER, 7, workspace, 7
bind = SUPER, 8, workspace, 8

# Mover ventana activa a workspace
bind = SUPER SHIFT, 1, movetoworkspace, 1
bind = SUPER SHIFT, 2, movetoworkspace, 2
bind = SUPER SHIFT, 3, movetoworkspace, 3
bind = SUPER SHIFT, 4, movetoworkspace, 4
bind = SUPER SHIFT, 5, movetoworkspace, 5
bind = SUPER SHIFT, 6, movetoworkspace, 6
bind = SUPER SHIFT, 7, movetoworkspace, 7
bind = SUPER SHIFT, 8, movetoworkspace, 8

# Navegar entre workspaces con scroll sobre la barra
bind = SUPER, mouse_down, workspace, e+1
bind = SUPER, mouse_up,   workspace, e-1

#------
# RATÓN
#------
bindm = SUPER, mouse:272, movewindow
bindm = SUPER, mouse:273, resizewindow
