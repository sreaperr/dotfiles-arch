#============================
# KEYBINDS DE DOTFILES ARCH
#============================
# SUPER = tecla Windows / Meta

#--------------
# APLICACIONES
#--------------
bind = SUPER,       return, exec, kitty
bind = SUPER,       y,      exec, ~/.config/hypr/scripts/yazi-float.sh
bind = SUPER,       b,      exec, brave
bind = SUPER,       space,  exec, ~/.config/rofi/launchers/type-2/launcher.sh
bind = SUPER,       c,      exec, rofi -show calc -no-show-match -no-sort -theme ~/.config/rofi/runner.rasi
bind = SUPER,       tab,    exec, rofi -show window -theme ~/.config/rofi/runner.rasi
bind = SUPER SHIFT, space,  exec, rofi -show run -theme ~/.config/rofi/runner.rasi
bind = SUPER,       s,      exec, ~/.config/rofi/applets/bin/mpd.sh

#-----------
# CAPTURAS  (flameshot → portapapeles)
#-----------
bind =            , Print,  exec, ~/.config/rofi/applets/bin/screenshot.sh
bind =       SHIFT, Print,  exec, flameshot full -c

#-----------
# ENTORNO
#-----------
bind = SUPER,       t,      exec, ~/.config/hypr/scripts/wallpaper-picker.sh
bind = SUPER,       w,      killactive

#--------
# SISTEMA
#--------
bind = SUPER SHIFT, e,      exit
bind = SUPER,       f,      fullscreen, 0
bind = SUPER SHIFT, f,      togglefloating
bind = SUPER CTRL,  f,      exec, hyprctl dispatch resizeactive exact 1200 700 && hyprctl dispatch centerwindow
bind = SUPER SHIFT, p,      pin
bind = SUPER,       l,      exec, hyprlock
bind = SUPER,       i,      exec, ~/.config/rofi/powermenu/type-2/powermenu.sh

#------------------------
# PANEL Y HERRAMIENTAS
#------------------------
bind = SUPER,       a,     exec, ~/.config/rofi/applets/bin/apps.sh
bind = SUPER,       v,     exec, ~/.config/rofi/applets/bin/volume.sh
bind = SUPER,       q,     exec, ~/.config/rofi/applets/bin/quicklinks.sh
bind = SUPER,       h,     exec, cliphist list | rofi -dmenu -p "  Portapapeles" -theme ~/.config/rofi/runner.rasi | cliphist decode | wl-copy
bind = SUPER,       k,     exec, ~/.config/hypr/scripts/calcurse-float.sh

#-----------------------
# TECLAS DE FUNCIÓN
#-----------------------
# F3 → ciclar orientación de ventanas del layout master (horizontal/vertical/etc.)
bind = , f3, layoutmsg, orientationcycle
# F4 → menú de atajos de teclado (rofi)
bind = , f4, exec, ~/.config/hypr/scripts/keybindings-menu.sh
# Teclas multimedia — funcionan en cualquier teclado con teclas media dedicadas
bindl = , XF86AudioPrev,  exec, playerctl previous
bindl = , XF86AudioPlay,  exec, playerctl play-pause
bindl = , XF86AudioNext,  exec, playerctl next
#------
# AUDIO
#------
bindel = , XF86AudioRaiseVolume,  exec, ~/.config/hypr/scripts/volume.sh up
bindel = , XF86AudioLowerVolume,  exec, ~/.config/hypr/scripts/volume.sh down
bindl  = , XF86AudioMute,         exec, ~/.config/hypr/scripts/volume.sh mute
bindl  = , XF86AudioMicMute,      exec, ~/.config/hypr/scripts/volume.sh mic-mute

#-------
# BRILLO
#-------
bindel = , XF86MonBrightnessUp,   exec, ddcutil setvcp 10 + 10 --display 1 & ddcutil setvcp 10 + 10 --display 2
bindel = , XF86MonBrightnessDown, exec, ddcutil setvcp 10 - 10 --display 1 & ddcutil setvcp 10 - 10 --display 2

#--------------------------------------
# NAVEGACIÓN DE VENTANAS (master layout)
#--------------------------------------
bind = SUPER, left, movefocus, l
bind = SUPER, right, movefocus, r
bind = SUPER, up, movefocus, u
bind = SUPER, down, movefocus, d

# Mover ventanas
bind = SUPER SHIFT, left, movewindow, l
bind = SUPER SHIFT, right, movewindow, r
bind = SUPER SHIFT, up, movewindow, u
bind = SUPER SHIFT, down, movewindow, d

# Redimensionar ventanas
binde = SUPER CTRL, left,  resizeactive, -30  0
binde = SUPER CTRL, right, resizeactive,  30  0
binde = SUPER CTRL, up,    resizeactive,   0 30
binde = SUPER CTRL, down,  resizeactive,   0 -30

# Cambiar ventana maestra
bind = SUPER, m, layoutmsg, swapwithmaster

#-----------
# WORKSPACES
#-----------
bind = SUPER, 1, workspace, 1
bind = SUPER, 2, workspace, 2
bind = SUPER, 3, workspace, 3
bind = SUPER, 4, workspace, 4
bind = SUPER, 5, workspace, 5
bind = SUPER, 6, workspace, 6
bind = SUPER, 7, workspace, 7
bind = SUPER, 8, workspace, 8
bind = SUPER, 9, workspace, 9
bind = SUPER, 0, workspace, 10

# Mover ventana activa a workspace
bind = SUPER SHIFT, 1, movetoworkspace, 1
bind = SUPER SHIFT, 2, movetoworkspace, 2
bind = SUPER SHIFT, 3, movetoworkspace, 3
bind = SUPER SHIFT, 4, movetoworkspace, 4
bind = SUPER SHIFT, 5, movetoworkspace, 5
bind = SUPER SHIFT, 6, movetoworkspace, 6
bind = SUPER SHIFT, 7, movetoworkspace, 7
bind = SUPER SHIFT, 8, movetoworkspace, 8
bind = SUPER SHIFT, 9, movetoworkspace, 9
bind = SUPER SHIFT, 0, movetoworkspace, 10

# Navegar entre workspaces con scroll sobre la barra
bind = SUPER, mouse_down, workspace, e+1
bind = SUPER, mouse_up,   workspace, e-1

#------
# RATÓN
#------
bindm = SUPER, mouse:272, movewindow
bindm = SUPER, mouse:273, resizewindow

#-----------
# LOCAL (máquina específica, gitignored)
#-----------
source = ~/.config/hypr/keybinds-local.conf
