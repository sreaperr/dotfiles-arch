#==========================
# HYPRLAND DE DOTFILES ARCH
#==========================

#-----------
# ARCHIVOS EXTERNOS
#-----------
source = ~/.config/hypr/keybinds.conf
source = ~/.config/hypr/rules.conf
# Colores del tema activo (tokyonight/auditory)
source = ~/.config/hypr/theme.conf

#-----------
# MONITORES
#-----------
# Regla universal: usa la resolución nativa de cualquier monitor conectado.
# Los perfiles multi-monitor los gestiona kanshi (exec-once más abajo).
monitor = ,preferred,auto,1

#----------
# AUTOSTART
#----------
# Fondo de pantalla — arranca el daemon y restaura el último fondo usado
exec-once = ~/.config/hypr/scripts/start-wallpaper.sh
# Barra de estado
exec-once = systemctl --user start waybar
# Notificaciones
exec-once = swaync
# Portapapeles
exec-once = wl-paste --type text --watch cliphist store
exec-once = wl-paste --type image --watch cliphist store
# Agente de autenticación
exec-once = /usr/lib/polkit-gnome/polkit-gnome-authentication-agent-1
# Automontaje de USBs
exec-once = udiskie &
# NetworkManager applet
exec-once = nm-applet --indicator
# Daemon de inactividad
exec-once = hypridle
# Filtro de luz azul (activo de noche, ajusta latitud de España)
exec-once = wlsunset -l 40.4 -L -3.7
# Aplicar tema según OS al arrancar
exec-once = ~/.config/hypr/scripts/theme-startup.sh
# Plugins — hyprpm los compila para la versión instalada y los carga todos de una
exec-once = hyprpm reload -n
# Monitor profiles — detecta qué pantallas hay conectadas y aplica el perfil correcto
exec-once = kanshid
# pyprland — daemon para expose (overview de workspaces con F4)
exec-once = pypr

#---------------------
# VARIABLES DE ENTORNO
#---------------------
env = XCURSOR_SIZE,24
env = XCURSOR_THEME,Bibata-Modern-Ice
env = QT_QPA_PLATFORM,wayland
env = QT_WAYLAND_DISABLE_WINDOWDECORATION,1
env = GDK_BACKEND,wayland,x11
env = SDL_VIDEODRIVER,wayland
env = CLUTTER_BACKEND,wayland

#--------
# GENERAL
#--------
general {
    gaps_in          = 3
    gaps_out         = 5
    border_size      = 2
    resize_on_border = true
    layout           = master
}

#-----------------------------------
# DECORACIÓN (bordes, blur, sombras)
#-----------------------------------
decoration {
    rounding = 10

    blur {
        enabled       = true
        size          = 8
        passes        = 3
        new_optimizations = true
        xray          = false
        ignore_opacity = false
    }

    shadow {
        enabled       = true
        range         = 30
        render_power  = 4
        color         = rgba(00000099)
    }

    inactive_opacity = 0.92
    active_opacity   = 1.0

    dim_inactive = true
    dim_strength = 0.15
    # Oscurece el fondo cuando hay un flotante activo (efecto modal macOS)
    dim_around   = 0.4
}

#------------
# ANIMACIONES
#------------
animations {
    enabled = true

    # ── CURVAS BEZIER — ESTILO macOS ───────────────────────────────
    # Entrada: easeOutBack suave — arranca, decelera y tiene un micro-overshoot
    # al llegar al tamaño final (el "spring" característico de macOS)
    bezier = macOpen,  0.18, 0.89, 0.32, 1.12
    # Salida: empieza rápido y frena brevemente al final
    # macOS siempre cierra más rápido de lo que abre
    bezier = macClose, 0.25, 0,    0.5,  0.4
    # Workspaces: easeOutQuad — momentum inicial que frena suave (macOS Spaces)
    bezier = macSlide, 0.25, 0.46, 0.45, 0.94
    # Fade: easeOutExpo — transición sutil, casi imperceptible
    bezier = macFade,  0.16, 1,    0.3,  1
    bezier = linear,   0,    0,    1,    1

    # ── VENTANAS ────────────────────────────────────────────────────
    # Entrada: 300ms, parte del 87% del tamaño final (efecto Scale de macOS)
    animation = windowsIn,        1, 3,   macOpen,  popin 87%
    # Salida: 150ms — la mitad de tiempo que la entrada, como en macOS
    animation = windowsOut,       1, 1.5, macClose, popin 87%
    # Movimiento y resize: fluido, sin rebote
    animation = windowsMove,      1, 3,   macSlide

    # ── BORDES ──────────────────────────────────────────────────────
    animation = border,           1, 6,   linear

    # ── FADE ────────────────────────────────────────────────────────
    animation = fadeIn,           1, 2,   macFade
    animation = fadeOut,          1, 1.5, macClose
    animation = fadeDim,          1, 3,   macFade
    animation = fadeShadow,       1, 3,   macFade
    animation = fadeLayers,       1, 2,   macFade

    # ── CAPAS (waybar, rofi, swaync, eww) ───────────────────────────
    animation = layersIn,         1, 2.5, macOpen,  fade
    animation = layersOut,        1, 1.5, macClose, fade

    # ── WORKSPACES — macOS Spaces ────────────────────────────────────
    # Slide horizontal suave con inercia que frena al llegar
    animation = workspaces,       1, 5,   macSlide, slide
    animation = specialWorkspace, 1, 4,   macSlide, slidevert
}

#--------------
# LAYOUT MASTER
#--------------
master {
    new_status       = slave
    mfact            = 0.55
    orientation      = left
}

#------------------------
# INPUT (teclado y ratón)
#------------------------
input {
    kb_layout    = es
    kb_model     = pc105
    kb_options   = terminate:ctrl_alt_bksp,lv3:lalt_switch

    follow_mouse = 1

    sensitivity  = 0
    accel_profile = flat

    touchpad {
        natural_scroll = false
    }
}

device {
    name = cherry--wireless-mouse--mouse
    left_handed = true
}

# Configuración de keyd para teclado Mac
# Las reasignaciones de Cmd/Opt/Fn se gestionan en /etc/keyd/default.conf

#-------
# GESTOS
#-------
gestures {
    workspace_swipe_distance     = 300
    workspace_swipe_cancel_ratio = 0.5
}

#-----
# MISC
#-----
misc {
    force_default_wallpaper  = 0
    disable_hyprland_logo    = true
    disable_splash_rendering = true
}

#---------
# PLUGINS
#---------
plugin {
    # borders-plus-plus — segundo borde exterior decorativo
    borders-plus-plus {
        add_borders      = 1
        natural_rounding = true
        col.border_1     = rgba(ffffff18)
        border_size_1    = 2
    }

    # hyprfocus — micro-shrink al enfocar ventana
    hyprfocus {
        enabled                 = yes
        animate_floating        = yes
        animate_workspacechange = yes
        focus_animation         = shrink
        bezier = bezIn,  0.5, 0.0, 1.0, 0.5
        bezier = bezOut, 0.0, 0.5, 0.5, 1.0
        shrink {
            shrink_percentage = 0.99
            in_bezier         = bezIn
            in_speed          = 1
            out_bezier        = bezOut
            out_speed         = 2
        }
    }


}

#-----------
# WORKSPACES
#-----------
# 8 workspaces en el monitor actual
workspace = 1, monitor:,default:true
workspace = 2, monitor:
workspace = 3, monitor:
workspace = 4, monitor:
workspace = 5, monitor:
workspace = 6, monitor:
workspace = 7, monitor:
workspace = 8, monitor:

# --- WORKSPACES FUTURA CONFIGURACIÓN DUAL MONITOR ---
# Descomenta cuando tengas dos monitores
# Workspaces 1-8 en el principal (40"), 9-10 en el secundario (16")
# workspace = 1, monitor:DP-1, default:true
# workspace = 2, monitor:DP-1
# workspace = 3, monitor:DP-1
# workspace = 4, monitor:DP-1
# workspace = 5, monitor:DP-1
# workspace = 6, monitor:DP-1
# workspace = 7, monitor:DP-1
# workspace = 8, monitor:DP-1
# workspace = 9, monitor:HDMI-A-1, default:true
# workspace = 10, monitor:HDMI-A-1

