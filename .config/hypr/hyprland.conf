#==========================
# HYPRLAND DE DOTFILES ARCH
#==========================

#-----------
# ARCHIVOS EXTERNOS
#-----------
source = ~/.config/hypr/keybinds.conf
source = ~/.config/hypr/rules.conf
# Colores del tema activo (gruvbox/tokyonight)
source = ~/.config/hypr/theme.conf

#-----------
# MONITORES
#-----------
# Monitor activo: portátil 16" 1920x1080
monitor = ,1920x1080@60,0x0,1
# Monitor desactivado: MSI 40 PULGADAS
# Descomenta esta línea si solo vas a usar el MSI
# monitor = .3440x1440@155,0x0,1

# --- CONFIGURACIÓN FUTURA DOS MONITORES ---
# Descomenta estas líneas y comenta la de arriba cuando tengas el setup dual
# Monitor principal: MSI MAG401QR 40" ultrawide 3440x1440 @ 155Hz
# monitor = ,3440x1440@155,0x0,1
# Monitor secundario: portátil 16" a la derecha del principal
# monitor = ,1920x1080@60,3440x0,1

#----------
# AUTOSTART
#----------
# Fondo de pantalla — arranca el daemon y restaura el último fondo usado
exec-once = ~/.config/hypr/scripts/start-wallpaper.sh
# Barra de estado
exec-once = systemctl --user start waybar
# Notificaciones
exec-once = swaync
# Portapapeles
exec-once = wl-paste --type text --watch cliphist store
exec-once = wl-paste --type image --watch cliphist store
# Agente de autenticación
exec-once = /usr/lib/polkit-gnome/polkit-gnome-authentication-agent-1
# Automontaje de USBs
exec-once = udiskie &
# NetworkManager applet
exec-once = nm-applet --indicator
# Daemon de inactividad
exec-once = hypridle
# Filtro de luz azul (activo de noche, ajusta latitud de España)
exec-once = wlsunset -l 40.4 -L -3.7
exec-once = ~/.config/hypr/scripts/startup-fastfetch.sh
exec-once = ~/.config/hypr/scripts/startup-keybinds.sh

#---------------------
# VARIABLES DE ENTORNO
#---------------------
env = XCURSOR_SIZE,24
env = XCURSOR_THEME,Bibata-Modern-Ice
env = QT_QPA_PLATFORM,wayland
env = QT_WAYLAND_DISABLE_WINDOWDECORATION,1
env = GDK_BACKEND,wayland,x11
env = SDL_VIDEODRIVER,wayland
env = CLUTTER_BACKEND,wayland

#--------
# GENERAL
#--------
general {
    gaps_in          = 5
    gaps_out         = 10
    border_size      = 2
    resize_on_border = true
    layout           = master
}

#-----------------------------------
# DECORACIÓN (bordes, blur, sombras)
#-----------------------------------
decoration {
    rounding = 10

    blur {
        enabled       = true
        size          = 8
        passes        = 3
        new_optimizations = true
        xray          = false
        ignore_opacity = false
    }

    shadow {
        enabled       = true
        range         = 15
        render_power  = 3
    }

    inactive_opacity = 0.92
    active_opacity   = 1.0
}

#------------
# ANIMACIONES
#------------
animations {
    enabled = true

    bezier = easeOutCubic,  0.33, 1,    0.68, 1
    bezier = easeInOutCubic,0.65, 0,    0.35, 1
    bezier = easeOutBack,   0.34, 1.56, 0.64, 1

    animation = windows,     1, 4,  easeOutBack,   slide
    animation = windowsOut,  1, 3,  easeOutCubic,  slide
    animation = border,      1, 6,  easeOutCubic
    animation = fade,        1, 4,  easeOutCubic
    animation = workspaces,  1, 4,  easeInOutCubic,slide
}

#--------------
# LAYOUT MASTER
#--------------
master {
    new_status       = slave
    mfact            = 0.55
    orientation      = left
}

#------------------------
# INPUT (teclado y ratón)
#------------------------
input {
    kb_layout    = es
    kb_model     = pc105
    kb_options   = terminate:ctrl_alt_bksp,lv3:lalt_switch

    follow_mouse = 1

    sensitivity  = 0
    accel_profile = flat

    touchpad {
        natural_scroll = false
    }
}

device {
    name = cherry--wireless-mouse--mouse
    left_handed = true
}

# Configuración de keyd para teclado Mac
# Las reasignaciones de Cmd/Opt/Fn se gestionan en /etc/keyd/default.conf

#-------
# GESTOS
#-------
gestures {
    workspace_swipe_distance     = 300
    workspace_swipe_cancel_ratio = 0.5
}

#-----
# MISC
#-----
misc {
    force_default_wallpaper  = 0
    disable_hyprland_logo    = true
    disable_splash_rendering = true
}

#-----------
# WORKSPACES
#-----------
# 8 workspaces en el monitor actual
workspace = 1, monitor:,default:true
workspace = 2, monitor:
workspace = 3, monitor:
workspace = 4, monitor:
workspace = 5, monitor:
workspace = 6, monitor:
workspace = 7, monitor:
workspace = 8, monitor:

# --- WORKSPACES FUTURA CONFIGURACIÓN DUAL MONITOR ---
# Descomenta cuando tengas dos monitores
# Workspaces 1-8 en el principal (40"), 9-10 en el secundario (16")
# workspace = 1, monitor:DP-1, default:true
# workspace = 2, monitor:DP-1
# workspace = 3, monitor:DP-1
# workspace = 4, monitor:DP-1
# workspace = 5, monitor:DP-1
# workspace = 6, monitor:DP-1
# workspace = 7, monitor:DP-1
# workspace = 8, monitor:DP-1
# workspace = 9, monitor:HDMI-A-1, default:true
# workspace = 10, monitor:HDMI-A-1
