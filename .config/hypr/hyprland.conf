#==========================
# HYPRLAND DE DOTFILES ARCH
#==========================

#-----------
# ARCHIVOS EXTERNOS
#-----------
source = ~/.config/hypr/keybinds.conf
source = ~/.config/hypr/rules.conf
# Colores del tema activo (tokyonight/auditory)
source = ~/.config/hypr/theme.conf

#-----------
# MONITORES
#-----------
# Auto — kanshi sobreescribe con el perfil correcto una vez detecta los monitores
monitor = ,preferred,auto,1

#----------
# AUTOSTART
#----------
#exec-once = ~/.config/hypr/scripts/start-wallpaper.sh
# Barra de estado
exec-once = systemctl --user start waybar
# Notificaciones
exec-once = swaync
# Portapapeles
exec-once = wl-paste --type text --watch cliphist store
exec-once = wl-paste --type image --watch cliphist store
# Agente de autenticación
exec-once = /usr/lib/polkit-gnome/polkit-gnome-authentication-agent-1
# Automontaje de USBs
exec-once = udiskie &
# NetworkManager applet
exec-once = nm-applet --indicator
# Daemon de inactividad
exec-once = hypridle
# Filtro de luz azul (activo de noche, ajusta latitud de España)
exec-once = wlsunset -l 40.4 -L -3.7
# Aplicar tema según OS al arrancar
exec-once = ~/.config/hypr/scripts/theme-startup.sh
# Plugins — hyprpm los compila para la versión instalada y los carga todos de una
exec-once = hyprpm reload -n
# Pyprland — scratchpads y plugins de Hyprland en espacio de usuario
exec-once = pypr
# Monitor profiles — detecta qué pantallas hay conectadas y aplica el perfil correcto
exec-once = kanshi
# OSD de volumen y brillo en pantalla (swayosd-client en keybinds)
exec-once = swayosd-server
# OSD de volumen — gestionado por volume.sh via wpctl + notify-send → swaync
# Notificaciones de Spotify al cambiar canción
exec-once = ~/.config/hypr/scripts/spotify-notify.sh

#---------------------
# VARIABLES DE ENTORNO
#---------------------
env = HYPRCURSOR_THEME,Bibata-Modern-Ice-Hypr
env = HYPRCURSOR_SIZE,24
env = QT_QPA_PLATFORM,wayland
env = QT_QPA_PLATFORMTHEME,qt6ct
env = QT_WAYLAND_DISABLE_WINDOWDECORATION,1
env = GDK_BACKEND,wayland,x11
env = SDL_VIDEODRIVER,wayland
env = CLUTTER_BACKEND,wayland

#--------
# GENERAL
#--------
general {
    gaps_in          = 5
    gaps_out         = 10
    border_size      = 1
    resize_on_border = true
    layout           = master
    # colores de borde definidos en theme.conf — no poner aquí o sobreescriben el tema
}

#-----------------------------------
# DECORACIÓN (bordes, blur, sombras)
#-----------------------------------
decoration {
    rounding = 16

    blur {
        enabled       = true
        size          = 12
        passes        = 3
        new_optimizations = true
        xray          = false
        ignore_opacity = false
        noise         = 0.0117
    }

    shadow {
        enabled       = true
        range         = 50
        render_power  = 3
        color         = rgba(000000bb)
    }

    inactive_opacity = 1.0
    active_opacity   = 1.0

    dim_inactive = false
    # Oscurece el fondo cuando hay un flotante activo
    dim_around   = 0.0
}

#-----------------------------------
# LAYER RULES (waybar, rofi, etc.)
#-----------------------------------
# Difumina el fondo translúcido del waybar para que no se vea "crudo" sobre el wallpaper
layerrule = blur on, ignore_alpha 0.5, match:namespace waybar

#------------
# ANIMACIONES
#------------
animations {
    enabled = true

    # ── CURVAS BEZIER ───────────────────────────────────────────────
    # Entrada: easeOutBack — arranca, decelera y tiene un micro-overshoot al llegar
    bezier = springOpen,  0.18, 0.89, 0.32, 1.12
    # Salida: empieza rápido y frena brevemente al final
    bezier = quickClose,  0.25, 0,    0.5,  0.4
    # Workspaces: easeOutQuad — momentum inicial que frena suave
    bezier = slideEase,   0.25, 0.46, 0.45, 0.94
    # Fade: easeOutExpo — transición sutil, casi imperceptible
    bezier = fadeEase,    0.16, 1,    0.3,  1
    bezier = linear,      0,    0,    1,    1

    # ── VENTANAS ────────────────────────────────────────────────────
    # Entrada: parte del 87% del tamaño final (efecto popin)
    animation = windowsIn,        1, 3,   springOpen,  popin 87%
    # Salida: más rápida que la entrada
    animation = windowsOut,       1, 1.5, quickClose,  popin 87%
    # Movimiento y resize: fluido, sin rebote
    animation = windowsMove,      1, 3,   slideEase

    # ── BORDES ──────────────────────────────────────────────────────
    animation = border,           1, 6,   linear

    # ── FADE ────────────────────────────────────────────────────────
    animation = fadeIn,           1, 2,   fadeEase
    animation = fadeOut,          1, 1.5, quickClose
    animation = fadeDim,          1, 3,   fadeEase
    animation = fadeShadow,       1, 3,   fadeEase
    animation = fadeLayers,       1, 2,   fadeEase

    # ── CAPAS (waybar, rofi, swaync) ────────────────────────────────
    animation = layersIn,         1, 2.5, springOpen,  fade
    animation = layersOut,        1, 1.5, quickClose,  fade

    # ── WORKSPACES ──────────────────────────────────────────────────
    # Slide horizontal suave con inercia que frena al llegar
    animation = workspaces,       1, 5,   slideEase, slide
    animation = specialWorkspace, 1, 4,   slideEase, slidevert
}

#--------------
# LAYOUT MASTER
#--------------
master {
    new_status       = slave
    mfact            = 0.55
    orientation      = left
}

#------------------------
# INPUT (teclado y ratón)
#------------------------
input {
    kb_layout    = es
    kb_model     = pc105
    # terminate:ctrl_alt_bksp → Ctrl+Alt+Retroceso mata el servidor gráfico
    kb_options   = terminate:ctrl_alt_bksp

    follow_mouse = 1

    # sensitivity: -1.0 (lento) a 1.0 (rápido), 0 es el valor por defecto
    sensitivity   = 0
    accel_profile = adaptive
}


#-------
# GESTOS
#-------
gestures {
    workspace_swipe_distance     = 300
    workspace_swipe_cancel_ratio = 0.5
}

#-----
# MISC
#-----
misc {
    force_default_wallpaper  = 0
    disable_hyprland_logo    = true
    disable_splash_rendering = true
    focus_on_activate        = true
}


#-----------
# WORKSPACES
#-----------
workspace = 1,  monitor:DP-1, default:true
workspace = 2,  monitor:DP-1
workspace = 3,  monitor:DP-1
workspace = 4,  monitor:DP-1
workspace = 5,  monitor:DP-1
workspace = 6,  monitor:HDMI-A-1, default:true
workspace = 7,  monitor:HDMI-A-1
workspace = 8,  monitor:HDMI-A-1
workspace = 9,  monitor:HDMI-A-1
workspace = 10, monitor:HDMI-A-1

