#==========================
# HYPRLAND DE DOTFILES ARCH
#==========================

#-----------
# ARCHIVOS EXTERNOS
#-----------
source = ~/.config/hypr/keybinds.conf
source = ~/.config/hypr/rules.conf
# Colores del tema activo (tokyonight/kali)
source = ~/.config/hypr/theme.conf

#-----------
# MONITORES
#-----------
# Monitor activo: portátil 16" 1920x1080
monitor = ,1920x1080@60,0x0,1
# Monitor desactivado: MSI 40 PULGADAS
# Descomenta esta línea si solo vas a usar el MSI
# monitor = .3440x1440@155,0x0,1

# --- CONFIGURACIÓN FUTURA DOS MONITORES ---
# Descomenta estas líneas y comenta la de arriba cuando tengas el setup dual
# Monitor principal: MSI MAG401QR 40" ultrawide 3440x1440 @ 155Hz
# monitor = ,3440x1440@155,0x0,1
# Monitor secundario: portátil 16" a la derecha del principal
# monitor = ,1920x1080@60,3440x0,1

#----------
# AUTOSTART
#----------
# Fondo de pantalla — arranca el daemon y restaura el último fondo usado
exec-once = ~/.config/hypr/scripts/start-wallpaper.sh
# Barra de estado
exec-once = systemctl --user start waybar
# Notificaciones
exec-once = swaync
# Portapapeles
exec-once = wl-paste --type text --watch cliphist store
exec-once = wl-paste --type image --watch cliphist store
# Agente de autenticación
exec-once = /usr/lib/polkit-gnome/polkit-gnome-authentication-agent-1
# Automontaje de USBs
exec-once = udiskie &
# NetworkManager applet
exec-once = nm-applet --indicator
# Daemon de inactividad
exec-once = hypridle
# Filtro de luz azul (activo de noche, ajusta latitud de España)
exec-once = wlsunset -l 40.4 -L -3.7
# Aplicar tema según OS al arrancar
exec-once = ~/.config/hypr/scripts/theme-startup.sh
# Plugins — hyprpm los compila para la versión instalada y los carga todos de una
exec-once = hyprpm reload -n

#---------------------
# VARIABLES DE ENTORNO
#---------------------
env = XCURSOR_SIZE,24
env = XCURSOR_THEME,Bibata-Modern-Ice
env = QT_QPA_PLATFORM,wayland
env = QT_WAYLAND_DISABLE_WINDOWDECORATION,1
env = GDK_BACKEND,wayland,x11
env = SDL_VIDEODRIVER,wayland
env = CLUTTER_BACKEND,wayland

#--------
# GENERAL
#--------
general {
    gaps_in          = 3
    gaps_out         = 5
    border_size      = 2
    resize_on_border = true
    layout           = master
}

#-----------------------------------
# DECORACIÓN (bordes, blur, sombras)
#-----------------------------------
decoration {
    rounding = 10

    blur {
        enabled       = true
        size          = 8
        passes        = 3
        new_optimizations = true
        xray          = false
        ignore_opacity = false
    }

    shadow {
        enabled       = true
        range         = 30
        render_power  = 4
        color         = rgba(00000099)
    }

    inactive_opacity = 0.92
    active_opacity   = 1.0

    dim_inactive = true
    dim_strength = 0.15
}

#------------
# ANIMACIONES
#------------
animations {
    enabled = true

    # Curvas bezier
    bezier = spring,     0.34, 1.8, 0.64, 1   # spring pronunciado — rebote vivo
    bezier = springOut,  0.36, 0,    0.66, -0.4 # salida con micro-retroceso
    bezier = macosClose, 0.7,  0,    1,    0.6  # salida rápida sin rebote
    bezier = momentum,   0.45, 0,    0.15, 1    # inercia para workspaces y movimiento
    bezier = smooth,     0.16, 1,    0.3,  1    # decelera fuerte — fade y bordes
    bezier = linear,     0,    0,    1,    1

    # Ventanas — popin desde 50% con spring rebotado
    animation = windows,          1, 5, spring,     popin 50%
    animation = windowsOut,       1, 3, springOut,  popin 65%
    animation = windowsMove,      1, 4, momentum,   slidefade

    # Bordes
    animation = border,           1, 6, smooth

    # Fade — dim y sombras suaves
    animation = fade,             1, 4, smooth
    animation = fadeDim,          1, 5, smooth
    animation = fadeShadow,       1, 4, smooth
    animation = fadeLayers,       1, 3, smooth

    # Capas (waybar, rofi, swaync)
    animation = layers,           1, 3, smooth,  fade

    # Workspaces — slide con spring rebotado
    animation = workspaces,       1, 4, spring, slide
    animation = specialWorkspace, 1, 5, spring,   slidevert
}

#--------------
# LAYOUT MASTER
#--------------
master {
    new_status       = slave
    mfact            = 0.55
    orientation      = left
}

#------------------------
# INPUT (teclado y ratón)
#------------------------
input {
    kb_layout    = es
    kb_model     = pc105
    kb_options   = terminate:ctrl_alt_bksp,lv3:lalt_switch

    follow_mouse = 1

    sensitivity  = 0
    accel_profile = flat

    touchpad {
        natural_scroll = false
    }
}

device {
    name = cherry--wireless-mouse--mouse
    left_handed = true
}

# Configuración de keyd para teclado Mac
# Las reasignaciones de Cmd/Opt/Fn se gestionan en /etc/keyd/default.conf

#-------
# GESTOS
#-------
gestures {
    workspace_swipe_distance     = 300
    workspace_swipe_cancel_ratio = 0.5
}

#-----
# MISC
#-----
misc {
    force_default_wallpaper  = 0
    disable_hyprland_logo    = true
    disable_splash_rendering = true
}

#---------
# PLUGINS
#---------
plugin {
    # borders-plus-plus — segundo borde exterior decorativo
    borders-plus-plus {
        add_borders      = 1
        natural_rounding = true
        col.border_1     = rgba(ffffff18)
        border_size_1    = 2
    }

    # hyprfocus — micro-shrink al enfocar ventana
    hyprfocus {
        enabled                 = yes
        animate_floating        = yes
        animate_workspacechange = yes
        focus_animation         = shrink
        bezier = bezIn,  0.5, 0.0, 1.0, 0.5
        bezier = bezOut, 0.0, 0.5, 0.5, 1.0
        shrink {
            shrink_percentage = 0.99
            in_bezier         = bezIn
            in_speed          = 1
            out_bezier        = bezOut
            out_speed         = 2
        }
    }

    # hyprexpo — overview de workspaces (F4)
    hyprexpo {
        columns               = 3
        gap_size              = 6
        gap_size_outer        = 8
        bg_col                = rgb(000000)
        workspace_method      = center current
        border_color_current  = rgb(00d4ff)
        border_color_hover    = rgb(00b33c)
        border_color_focus    = rgb(ff2d78)
        tile_rounding         = 10
        window_icon_enable    = false
    }
}

#-----------
# WORKSPACES
#-----------
# 8 workspaces en el monitor actual
workspace = 1, monitor:,default:true
workspace = 2, monitor:
workspace = 3, monitor:
workspace = 4, monitor:
workspace = 5, monitor:
workspace = 6, monitor:
workspace = 7, monitor:
workspace = 8, monitor:

# --- WORKSPACES FUTURA CONFIGURACIÓN DUAL MONITOR ---
# Descomenta cuando tengas dos monitores
# Workspaces 1-8 en el principal (40"), 9-10 en el secundario (16")
# workspace = 1, monitor:DP-1, default:true
# workspace = 2, monitor:DP-1
# workspace = 3, monitor:DP-1
# workspace = 4, monitor:DP-1
# workspace = 5, monitor:DP-1
# workspace = 6, monitor:DP-1
# workspace = 7, monitor:DP-1
# workspace = 8, monitor:DP-1
# workspace = 9, monitor:HDMI-A-1, default:true
# workspace = 10, monitor:HDMI-A-1

