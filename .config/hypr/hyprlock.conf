#==========================
# HYPRLOCK - DOTFILES ARCH
#==========================
# Colores del tema activo
source = ~/.config/hypr/hyprlock-theme.conf

general {
    disable_loading_bar = true
    hide_cursor         = true
    grace               = 0
    no_fade_in          = false
}

#-----------
# FONDO
#-----------
# Captura la pantalla actual y aplica blur
background {
    monitor =
    path    = screenshot
    blur_passes     = 3
    blur_size       = 8
    noise           = 0.0117
    contrast        = 0.8916
    brightness      = 0.8172
    vibrancy        = 0.1696
    vibrancy_darkness = 0.0
}

#-----------
# RELOJ GRANDE
#-----------
label {
    monitor =
    text    = cmd[update:1000] echo "$(date +"%H:%M")"
    color       = $accent
    font_size   = 96
    font_family = Hack Nerd Font Bold

    position  = 0, 80
    halign    = center
    valign    = center
}

#-----------
# FECHA
#-----------
label {
    monitor =
    text    = cmd[update:60000] echo "$(date +"  %A, %d de %B")"
    color       = $fg
    font_size   = 18
    font_family = Hack Nerd Font

    position  = 0, -20
    halign    = center
    valign    = center
}

#-----------
# FASTFETCH
#-----------
label {
    monitor =
    text    = cmd[update:60000] fastfetch --logo none --pipe 2>/dev/null | head -12
    color       = $fg_dim
    font_size   = 11
    font_family = Hack Nerd Font

    position  = -60, 60
    halign    = right
    valign    = bottom
}

#-----------
# CAMPO DE CONTRASEÑA
#-----------
input-field {
    monitor =
    size              = 280, 48
    outline_thickness = 2
    dots_size         = 0.26
    dots_spacing      = 0.15
    dots_center       = true
    fade_on_empty     = true
    placeholder_text  = "  contraseña..."
    hide_input        = false
    rounding          = 10
    outer_color       = $accent
    inner_color       = $bg
    font_color        = $fg
    fail_color        = $red
    check_color       = $accent_alt

    position  = 0, -160
    halign    = center
    valign    = center
}

#-----------
# MENSAJE DE ERROR
#-----------
label {
    monitor =
    text    = $PAMFAIL
    color       = $red
    font_size   = 13
    font_family = Hack Nerd Font

    position  = 0, -220
    halign    = center
    valign    = center
}
