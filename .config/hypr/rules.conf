#===================
# REGLAS DE VENTANAS
# Sintaxis v0.55: windowrule[] = regla, matcher
#===================

# ── Ventanas flotantes ──
windowrule[] = float,  class:^(pavucontrol)$
windowrule[] = float,  class:^(blueman-manager)$
windowrule[] = float,  class:^(nm-connection-editor)$
windowrule[] = float,  class:^(imv)$
windowrule[] = float,  class:^(mpv)$

# ── Tamaño y centrado ──
windowrule[] = size 800 600, class:^(pavucontrol)$
windowrule[] = size 900 600, class:^(blueman-manager)$
windowrule[] = center,       class:^(pavucontrol)$
windowrule[] = center,       class:^(blueman-manager)$
windowrule[] = center,       class:^(nm-connection-editor)$

# ── Opacidad ──
windowrule[] = opacity 0.92 0.92, class:^(rofi)$

# ── Workspaces por app ──
windowrule[] = workspace 2, class:^(brave-browser)$
windowrule[] = workspace 2, class:^(firefox)$
windowrule[] = workspace 2, class:^(tor-browser)$
windowrule[] = workspace 3, class:^(nvim)$
windowrule[] = workspace 4, class:^(thunar)$
windowrule[] = workspace 6, class:^(thunderbird)$
windowrule[] = workspace 8, class:^(discord)$
windowrule[] = workspace 8, class:^(spotify)$

# ── Terminales flotantes con tamaño específico (estilo gh0stzk) ──

# fastfetch al inicio de sesión — flotante y centrado
windowrule[] = float,  class:^(startup-fastfetch)$
windowrule[] = center, class:^(startup-fastfetch)$

# fastfetch manual (SUPER+A) — ligeramente más grande
windowrule[] = float,  class:^(fastfetch-term)$
windowrule[] = center, class:^(fastfetch-term)$

# yazi flotante (SUPER+Y) — apaisado para las tres columnas
windowrule[] = float,  class:^(yazi-term)$
windowrule[] = size 1000 560, class:^(yazi-term)$
windowrule[] = center, class:^(yazi-term)$

# ── Animación popin para ventanas flotantes ──
windowrule[] = animation popin, floating:1
