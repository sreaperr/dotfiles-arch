#===================
# REGLAS DE VENTANAS
#===================

#-----------
# FLOTANTES
#-----------
windowrulev2 = float, class:^(pavucontrol)$
windowrulev2 = float, class:^(blueman-manager)$
windowrulev2 = float, class:^(nm-connection-editor)$
windowrulev2 = float, class:^(imv)$
windowrulev2 = float, class:^(mpv)$
windowrulev2 = float, title:^(Confirm)(.*)$
windowrulev2 = float, title:^(Open File)(.*)$
windowrulev2 = float, title:^(Save As)(.*)$

#--------------------
# TAMAÑO DE FLOTANTES
#--------------------
windowrulev2 = size 800 600, class:^(pavucontrol)$
windowrulev2 = size 900 600, class:^(blueman-manager)$

#---------
# CENTRADO
#---------
windowrulev2 = center, class:^(pavucontrol)$
windowrulev2 = center, class:^(blueman-manager)$
windowrulev2 = center, class:^(nm-connection-editor)$

#------------------------
# OPACIDAD EN FLOTANTES
#------------------------
# opacity = activa inactiva
windowrulev2 = opacity 0.92 0.92, class:^(rofi)$

#-----------------
# WORKSPACES FIJOS
#-----------------
windowrulev2 = workspace 2, class:^(brave-browser)$
windowrulev2 = workspace 2, class:^(firefox)$
windowrulev2 = workspace 2, class:^(tor-browser)$
windowrulev2 = workspace 3, class:^(nvim)$
windowrulev2 = workspace 4, class:^(thunar)$
windowrulev2 = workspace 6, class:^(thunderbird)$
windowrulev2 = workspace 8, class:^(discord)$
windowrulev2 = workspace 8, class:^(spotify)$

#---------
# XWAYLAND
#---------
# Fuerza escala 1 en apps XWayland para evitar blur
windowrulev2 = xray 1, xwayland:1
