#===================
# REGLAS DE VENTANAS
# Sintaxis Hyprland 0.55: bloques windowrule { name, match { }, propiedades }
#===================

# ── Apps flotantes ────────────────────────────────────────────────────────────

windowrule {
    name = pavucontrol
    match {
        class = ^org.pulseaudio.pavucontrol$
    }
    float  = true
    size   = 800 600
    center = true
}

windowrule {
    name = blueman-manager
    match {
        class = ^blueman-manager$
    }
    float  = true
    size   = 900 600
    center = true
}

windowrule {
    name = nm-connection-editor
    match {
        class = ^nm-connection-editor$
    }
    float  = true
    center = true
}

windowrule {
    name = spotify
    match {
        class = ^Spotify$
    }
    float          = true
    size           = 1200 800
    center         = true
    opacity        = 0.95 0.88
    suppress_event = activate
}

windowrule {
    name = imv
    match {
        class = ^imv$
    }
    float = true
}

windowrule {
    name = mpv
    match {
        class = ^mpv$
    }
    float        = true
    idle_inhibit = fullscreen
}

# ── Opacidad por app ──────────────────────────────────────────────────────────

windowrule {
    name = opacity-kitty
    match {
        class = ^kitty$
    }
    opacity = 0.88 0.78
}

windowrule {
    name = opacity-brave
    match {
        class = ^brave-browser$
    }
    opacity = 0.98 0.90
}

windowrule {
    name = opacity-chrome
    match {
        class = ^google-chrome$
    }
    opacity = 0.98 0.90
}

windowrule {
    name = opacity-chromium
    match {
        class = ^chromium$
    }
    opacity = 0.98 0.90
}

windowrule {
    name = opacity-firefox
    match {
        class = ^firefox$
    }
    opacity = 0.98 0.90
}

windowrule {
    name = opacity-torbrowser
    match {
        class = ^tor-browser$
    }
    opacity = 0.98 0.90
}

windowrule {
    name = opacity-rofi
    match {
        class = ^rofi$
    }
    opacity = 0.92 0.92
}

# ── Discord ───────────────────────────────────────────────────────────────────

windowrule {
    name = discord
    match {
        class = ^discord$
    }
    opacity        = 0.95 0.88
    suppress_event = activate
    workspace      = 8
}

# ── Workspaces por app ────────────────────────────────────────────────────────

windowrule {
    name = ws-brave
    match {
        class = ^brave-browser$
    }
    workspace = 2
}

windowrule {
    name = ws-chrome
    match {
        class = ^google-chrome$
    }
    workspace = 2
}

windowrule {
    name = ws-chromium
    match {
        class = ^chromium$
    }
    workspace = 2
}

windowrule {
    name = ws-firefox
    match {
        class = ^firefox$
    }
    workspace = 2
}

windowrule {
    name = ws-torbrowser
    match {
        class = ^tor-browser$
    }
    workspace = 2
}

windowrule {
    name = ws-thunar
    match {
        class = ^thunar$
    }
    workspace = 4
}

windowrule {
    name = ws-thunderbird
    match {
        class = ^thunderbird$
    }
    workspace = 6
}

# ── Idle inhibit cuando cualquier ventana está en fullscreen ──────────────────

windowrule {
    name = idle-inhibit-fullscreen
    match {
        fullscreen = true
    }
    idle_inhibit = fullscreen
}

# ── Dim alrededor de ventanas flotantes ───────────────────────────────────────

windowrule {
    name = dim-around-floats
    match {
        float = true
    }
    dim_around = true
}

# ── Animación popin para ventanas flotantes ───────────────────────────────────

windowrule {
    name = anim-popin-floats
    match {
        float = true
    }
    animation = popin
}

# ── Terminales flotantes (scripts) ────────────────────────────────────────────

windowrule {
    name = startup-fastfetch
    match {
        class = ^startup-fastfetch$
    }
    float  = true
    center = true
}

windowrule {
    name = fastfetch-term
    match {
        class = ^fastfetch-term$
    }
    float  = true
    center = true
}

windowrule {
    name = yazi-term
    match {
        class = ^yazi-term$
    }
    float  = true
    size   = 1000 560
    center = true
}

windowrule {
    name = calcurse-term
    match {
        class = ^calcurse-term$
    }
    float  = true
    size   = 900 580
    center = true
}

# ── Layer rules — blur en capas del compositor ────────────────────────────────

layerrule {
    name = blur-waybar
    match {
        namespace = ^waybar$
    }
    blur         = true
    ignore_alpha = 0
}

layerrule {
    name = blur-rofi
    match {
        namespace = ^rofi$
    }
    blur         = true
    ignore_alpha = 0
}

layerrule {
    name = blur-swaync-cc
    match {
        namespace = ^swaync-control-center$
    }
    blur         = true
    ignore_alpha = 0
}

layerrule {
    name = blur-swaync-notif
    match {
        namespace = ^swaync-notification-window$
    }
    blur         = true
    ignore_alpha = 0
}

layerrule {
    name = blur-eww-cc
    match {
        namespace = ^eww-control-center$
    }
    blur         = true
    ignore_alpha = 0
}
