#===================
# REGLAS DE VENTANAS
# Sintaxis v0.55: windowrule[] = regla, matcher
#===================

# ── Ventanas flotantes ──
windowrule[] = float,  class:^(pavucontrol)$
windowrule[] = float,  class:^(blueman-manager)$
windowrule[] = float,  class:^(nm-connection-editor)$
windowrule[] = float,  class:^(imv)$
windowrule[] = float,  class:^(mpv)$

# ── Tamaño y centrado ──
windowrule[] = size 800 600, class:^(pavucontrol)$
windowrule[] = size 900 600, class:^(blueman-manager)$
windowrule[] = center,       class:^(pavucontrol)$
windowrule[] = center,       class:^(blueman-manager)$
windowrule[] = center,       class:^(nm-connection-editor)$

# ── Opacidad por app ─────────────────────────────────────────────
# Formato: opacity <activa> <inactiva>
# Terminal — más transparente para ver el fondo
windowrule[] = opacity 0.88 0.78, class:^(kitty)$
# Editor — completamente opaco para no distraer
windowrule[] = opacity 1.0  1.0,  class:^(nvim)$
# Navegadores — casi opacos, ligera transparencia al perder foco
windowrule[] = opacity 0.98 0.90, class:^(brave-browser)$
windowrule[] = opacity 0.98 0.90, class:^(google-chrome)$
windowrule[] = opacity 0.98 0.90, class:^(chromium)$
windowrule[] = opacity 0.98 0.90, class:^(firefox)$
windowrule[] = opacity 0.98 0.90, class:^(tor-browser)$
# Apps multimedia y chat — semi-transparentes
windowrule[] = opacity 0.95 0.88, class:^(discord)$
windowrule[] = opacity 0.95 0.88, class:^(spotify)$
# Rofi — ya con blur, ligera transparencia
windowrule[] = opacity 0.92 0.92, class:^(rofi)$

# ── Inhibir idle (no apagar pantalla) ────────────────────────────
# mpv: pantalla siempre encendida durante reproducción de vídeo
windowrule[] = idleinhibit fullscreen, class:^(mpv)$
# Cualquier app en pantalla completa también inhibe el idle
windowrule[] = idleinhibit fullscreen, fullscreen:1

# ── Suprimir robo de foco al arrancar ────────────────────────────
# Discord y Spotify suelen activarse solos al iniciarse interrumpiendo el trabajo
windowrule[] = suppressevent activate, class:^(discord)$
windowrule[] = suppressevent activate, class:^(spotify)$

# ── Dim alrededor de flotantes (efecto modal) ────────────────────
windowrule[] = dimaround, floating:1

# ── Workspaces por app ──
windowrule[] = workspace 2, class:^(brave-browser)$
windowrule[] = workspace 2, class:^(google-chrome)$
windowrule[] = workspace 2, class:^(chromium)$
windowrule[] = workspace 2, class:^(firefox)$
windowrule[] = workspace 2, class:^(tor-browser)$
windowrule[] = workspace 3, class:^(nvim)$
windowrule[] = workspace 4, class:^(thunar)$
windowrule[] = workspace 6, class:^(thunderbird)$
windowrule[] = workspace 8, class:^(discord)$
windowrule[] = workspace 8, class:^(spotify)$

# ── Terminales flotantes con tamaño específico (estilo gh0stzk) ──

# fastfetch al inicio de sesión — flotante y centrado
windowrule[] = float,  class:^(startup-fastfetch)$
windowrule[] = center, class:^(startup-fastfetch)$

# fastfetch manual (SUPER+A) — ligeramente más grande
windowrule[] = float,  class:^(fastfetch-term)$
windowrule[] = center, class:^(fastfetch-term)$

# yazi flotante (SUPER+Y) — apaisado para las tres columnas
windowrule[] = float,  class:^(yazi-term)$
windowrule[] = size 1000 560, class:^(yazi-term)$
windowrule[] = center, class:^(yazi-term)$

# ── Animación popin para ventanas flotantes ──
windowrule[] = animation popin, floating:1

# ── Layer rules — blur en capas del compositor ───────────────────
# Aplica blur gaussiano real del contenido detrás de cada capa
# ignorezero evita artefactos en zonas completamente transparentes
layerrule = blur,       waybar
layerrule = ignorezero, waybar
layerrule = blur,       rofi
layerrule = ignorezero, rofi
layerrule = blur,       swaync-control-center
layerrule = ignorezero, swaync-control-center
layerrule = blur,       swaync-notification-window
layerrule = ignorezero, swaync-notification-window
layerrule = blur,       eww-control-center
layerrule = ignorezero, eww-control-center
