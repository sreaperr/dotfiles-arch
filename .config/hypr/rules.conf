#===================
# REGLAS DE VENTANAS
# Sintaxis Hyprland 0.55: bloques windowrule { name, match { }, propiedades }
#===================

# ── Scratchpads (pyprland) ────────────────────────────────────────────────────
windowrule {
    name = scratchpad-clock
    match {
        class = ^scratchpad-clock$
    }
    float = true
}
windowrule {
    name = scratchpad-fetch
    match {
        class = ^scratchpad-fetch$
    }
    float = true
}
windowrule {
    name = scratchpad-btop
    match {
        class = ^scratchpad-btop$
    }
    float = true
}
windowrule {
    name = scratchpad-keys
    match {
        class = ^scratchpad-keys$
    }
    float = true
}

windowrule {
    name = opacity-scratchpads
    match {
        class = ^scratchpad-
    }
    opacity = 0.85 0.85
}

# ── Apps flotantes ────────────────────────────────────────────────────────────

windowrule {
    name = pavucontrol
    match {
        class = ^org.pulseaudio.pavucontrol$
    }
    float  = true
    size   = 800 600
    center = true
}

windowrule {
    name = blueman-manager
    match {
        class = ^blueman-manager$
    }
    float  = true
    size   = 900 600
    center = true
}

windowrule {
    name = nautilus
    match {
        class = ^org.gnome.Nautilus$
    }
    float  = true
    size   = 1100 700
    center = true
}

windowrule {
    name = nm-connection-editor
    match {
        class = ^nm-connection-editor$
    }
    float  = true
    size   = 900 600
    center = true
}

windowrule {
    name = spotify
    match {
        class = ^Spotify$
    }
    float          = true
    size           = 1200 800
    center         = true
    suppress_event = activate
}

windowrule {
    name = imv
    match {
        class = ^imv$
    }
    float  = true
    size   = 1200 800
    center = true
}

windowrule {
    name = mpv
    match {
        class = ^mpv$
    }
    float        = true
    idle_inhibit = fullscreen
}

# ── Opacidad por app ──────────────────────────────────────────────────────────

windowrule {
    name = opacity-kitty
    match {
        class = ^kitty$
    }
    opacity = 0.88 0.88
}


# ── Discord ───────────────────────────────────────────────────────────────────

windowrule {
    name = discord
    match {
        class = ^discord$
    }
    suppress_event = activate
}


# ── Idle inhibit cuando cualquier ventana está en fullscreen ──────────────────

windowrule {
    name = idle-inhibit-fullscreen
    match {
        fullscreen = true
    }
    idle_inhibit = fullscreen
}

# ── Dim alrededor de ventanas flotantes ───────────────────────────────────────

windowrule {
    name = dim-around-floats
    match {
        float = true
    }
    dim_around = true
}

# ── Animación popin para ventanas flotantes ───────────────────────────────────

windowrule {
    name = anim-popin-floats
    match {
        float = true
    }
    animation = popin
}

# ── Terminales flotantes (scripts) ────────────────────────────────────────────

windowrule {
    name = yazi-term
    match {
        class = ^yazi-term$
    }
    float  = true
    size   = 1000 560
    center = true
}

windowrule {
    name = calcurse-term
    match {
        class = ^calcurse-term$
    }
    float  = true
    size   = 900 580
    center = true
}

# ── Extras flotantes ─────────────────────────────────────────────────────────

windowrule {
    name = gnome-system-monitor
    match {
        class = ^gnome-system-monitor$
    }
    float  = true
    size   = 900 650
    center = true
}

windowrule {
    name = gnome-calculator
    match {
        class = ^org.gnome.Calculator$
    }
    float  = true
    size   = 400 600
    center = true
}

# ── Layer rules — blur en capas del compositor ────────────────────────────────

layerrule {
    name = blur-waybar
    match {
        namespace = ^waybar$
    }
    blur         = true
    ignore_alpha = 0
}

layerrule {
    name = blur-rofi
    match {
        namespace = ^rofi$
    }
    blur         = true
    ignore_alpha = 0
}

layerrule {
    name = blur-swaync-cc
    match {
        namespace = ^swaync-control-center$
    }
    blur         = true
    ignore_alpha = 0
}

layerrule {
    name = blur-swaync-notif
    match {
        namespace = ^swaync-notification-window$
    }
    blur         = true
    ignore_alpha = 0
}

