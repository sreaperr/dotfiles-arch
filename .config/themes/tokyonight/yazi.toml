# Tokyo Night Night — folke/tokyonight.nvim (official)

[mgr]
cwd = { fg = "#7aa2f7", italic = true }

hovered         = { bg = "#283457" }
preview_hovered = { bg = "#283457" }

find_keyword  = { fg = "#1a1b26", bg = "#e0af68", bold = true }
find_position = { fg = "#bb9af7", bg = "#15161e", bold = true }

marker_copied   = { fg = "#9ece6a", bg = "#9ece6a" }
marker_cut      = { fg = "#f7768e", bg = "#f7768e" }
marker_marked   = { fg = "#7aa2f7", bg = "#7aa2f7" }
marker_selected = { fg = "#e0af68", bg = "#e0af68" }

count_copied   = { fg = "#1a1b26", bg = "#9ece6a" }
count_cut      = { fg = "#1a1b26", bg = "#f7768e" }
count_selected = { fg = "#1a1b26", bg = "#e0af68" }

border_symbol = "│"
border_style  = { fg = "#414868" }

[tabs]
active   = { fg = "#1a1b26", bg = "#7aa2f7" }
inactive = { fg = "#a9b1d6", bg = "#292e42" }

[mode]
normal_main = { fg = "#1a1b26", bg = "#7aa2f7", bold = true }
normal_alt  = { fg = "#7aa2f7", bg = "#292e42" }
select_main = { fg = "#1a1b26", bg = "#e0af68", bold = true }
select_alt  = { fg = "#e0af68", bg = "#292e42" }
unset_main  = { fg = "#1a1b26", bg = "#bb9af7", bold = true }
unset_alt   = { fg = "#bb9af7", bg = "#292e42" }

[status]
overall   = { fg = "#c0caf5", bg = "#1a1b26" }
sep_left  = { open = "", close = "" }
sep_right = { open = "", close = "" }

progress_label  = { fg = "#c0caf5", bold = true }
progress_normal = { fg = "#565f89", bg = "#283457" }
progress_error  = { fg = "#f7768e", bg = "#283457" }

perm_type  = { fg = "#7aa2f7" }
perm_read  = { fg = "#e0af68" }
perm_write = { fg = "#f7768e" }
perm_exec  = { fg = "#9ece6a" }
perm_sep   = { fg = "#414868" }

[pick]
border   = { fg = "#7aa2f7" }
active   = { fg = "#c0caf5", bg = "#283457" }
inactive = { fg = "#c0caf5" }

[input]
border   = { fg = "#7aa2f7" }
title    = { fg = "#7aa2f7" }
value    = { fg = "#bb9af7" }
selected = { bg = "#283457" }

[cmp]
border   = { fg = "#7aa2f7" }
active   = { fg = "#c0caf5", bg = "#283457" }
inactive = { fg = "#c0caf5" }
icon_file    = ""
icon_folder  = ""
icon_command = ""

[tasks]
border  = { fg = "#7aa2f7" }
title   = { fg = "#7aa2f7" }
hovered = { fg = "#c0caf5", bg = "#283457" }

[which]
cols            = 3
mask            = { bg = "#1a1b26" }
cand            = { fg = "#7dcfff" }
rest            = { fg = "#a9b1d6" }
desc            = { fg = "#bb9af7" }
separator       = " ➜ "
separator_style = { fg = "#565f89" }

[confirm]
border     = { fg = "#7aa2f7" }
title      = { fg = "#7aa2f7" }
btn_yes    = { bg = "#283457" }
btn_no     = {}
btn_labels = [ "  [Y]es  ", "  (N)o  " ]

[spot]
border = { fg = "#7aa2f7" }
title  = { fg = "#7aa2f7" }

[notify]
title_info  = { fg = "#7dcfff" }
title_warn  = { fg = "#e0af68" }
title_error = { fg = "#f7768e" }
icon_error  = ""
icon_warn   = ""
icon_info   = ""

[help]
on      = { fg = "#e0af68" }
run     = { fg = "#bb9af7" }
desc    = { fg = "#7aa2f7" }
hovered = { bg = "#283457" }
footer  = { fg = "#c0caf5", bg = "#15161e" }

[filetype]
rules = [
    { mime = "image/*",                                          fg = "#e0af68" },
    { mime = "{audio,video}/*",                                  fg = "#bb9af7" },
    { mime = "application/*zip",                                 fg = "#f7768e" },
    { mime = "application/x-{tar,bzip*,7z-compressed,xz,rar}",  fg = "#f7768e" },
    { mime = "application/{pdf,doc,rtf,vnd.*}",                  fg = "#7aa2f7" },
    { url = "*", is = "orphan", bg = "#f7768e" },
    { url = "*", is = "exec",   fg = "#9ece6a" },
    { url = "*/",               fg = "#7aa2f7" },
    { url = "*",                fg = "#c0caf5" },
]
