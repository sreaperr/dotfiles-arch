# Tokyo Night

set -g mode-style                  "fg=#c0caf5,bg=#283457"
set -g message-style               "fg=#c0caf5,bg=#283457"
set -g message-command-style       "fg=#c0caf5,bg=#283457"

set -g pane-border-style           "fg=#292e42"
set -g pane-active-border-style    "fg=#7aa2f7"

set -g status                      "on"
set -g status-justify              "left"
set -g status-style                "fg=#c0caf5,bg=#15161e"
set -g status-left-length          "100"
set -g status-right-length         "100"

set -g status-left  "#[fg=#15161e,bg=#7aa2f7,bold] #S #[fg=#7aa2f7,bg=#15161e,nobold,nounderscore,noitalics]"
set -g status-right "#[fg=#292e42,bg=#15161e,nobold,nounderscore,noitalics]#[fg=#c0caf5,bg=#292e42] %H:%M #[fg=#c0caf5,bg=#292e42,nobold,nounderscore,noitalics]#[fg=#15161e,bg=#7aa2f7,bold] #h "

setw -g window-status-activity-style "underscore,fg=#c0caf5,bg=#15161e"
setw -g window-status-separator      ""
setw -g window-status-style          "NONE,fg=#c0caf5,bg=#15161e"
setw -g window-status-format         "#[fg=#15161e,bg=#15161e,nobold,nounderscore,noitalics]#[default] #I  #W #F #[fg=#15161e,bg=#15161e,nobold,nounderscore,noitalics]"
setw -g window-status-current-format "#[fg=#15161e,bg=#292e42,nobold,nounderscore,noitalics]#[fg=#7aa2f7,bg=#292e42,bold] #I  #W #F #[fg=#292e42,bg=#15161e,nobold,nounderscore,noitalics]"
