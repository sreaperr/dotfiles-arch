# Thorn Forest — jpwol/thorn.nvim

set -g mode-style                  "fg=#87CBB1,bg=#26403E"
set -g message-style               "fg=#87CBB1,bg=#26403E"
set -g message-command-style       "fg=#87CBB1,bg=#26403E"

set -g pane-border-style           "fg=#1D3334"
set -g pane-active-border-style    "fg=#87CBB1"

set -g status                      "on"
set -g status-justify              "left"
set -g status-style                "fg=#87CBB1,bg=#131F20"
set -g status-left-length          "100"
set -g status-right-length         "100"

set -g status-left  "#[fg=#172526,bg=#87CBB1,bold] #S #[fg=#87CBB1,bg=#131F20,nobold,nounderscore,noitalics]"
set -g status-right "#[fg=#1D3334,bg=#131F20,nobold,nounderscore,noitalics]#[fg=#87CBB1,bg=#1D3334] %H:%M #[fg=#87CBB1,bg=#1D3334,nobold,nounderscore,noitalics]#[fg=#172526,bg=#87CBB1,bold] #h "

setw -g window-status-activity-style "underscore,fg=#9B9A8C,bg=#131F20"
setw -g window-status-separator      ""
setw -g window-status-style          "NONE,fg=#9B9A8C,bg=#131F20"
setw -g window-status-format         "#[fg=#131F20,bg=#131F20,nobold,nounderscore,noitalics]#[default] #I  #W #F #[fg=#131F20,bg=#131F20,nobold,nounderscore,noitalics]"
setw -g window-status-current-format "#[fg=#131F20,bg=#1D3334,nobold,nounderscore,noitalics]#[fg=#87CBB1,bg=#1D3334,bold] #I  #W #F #[fg=#1D3334,bg=#131F20,nobold,nounderscore,noitalics]"
